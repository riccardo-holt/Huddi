services:
  - type: web
    name: meta-ads-dashboard
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: META_ACCESS_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: AUTH_SECRET
        generateValue: true
